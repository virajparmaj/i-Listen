<style>/* ============================================================
   iListen — Design tokens
   Silver / white / graphite system with LCD-blue accents,
   echoing the iPod Classic menu and early iTunes utility feel.
   ============================================================ */

:root {
  /* ---- Base palette ---- */
  --ipod-bg:            #F8F8F4;
  --ipod-surface:       #EDEDEA;
  --ipod-white:         #FFFFFF;
  --ipod-silver:        #C8C8C8;
  --ipod-silver-soft:   #DCDCD8;
  --ipod-silver-deep:   #B4B4B0;

  --ipod-ink:           #111111;
  --ipod-ink-soft:      #6B6B6B;
  --ipod-graphite:      #2C2C2E;
  --ipod-graphite-2:    #3A3A3C;

  --ipod-lcd:           #8FB7D9;
  --ipod-lcd-soft:      #C5DAEC;
  --ipod-blue:          #3E6F9E;
  --ipod-blue-deep:     #335B82;
  --ipod-blue-bright:   #5B8CBE;

  --ipod-green:         #7AA874;
  --ipod-amber:         #C89B3C;
  --ipod-red:           #B75D5D;
  --ipod-copper:        #9A6B3F;
  --ipod-warm:          #F3ECDD;

  --ipod-select-top:    #6FA0CF;
  --ipod-select-bottom: #3E6F9E;

  /* ---- Semantic aliases ---- */
  --bg-app:            var(--ipod-bg);
  --surface-recessed:  var(--ipod-surface);
  --surface-panel:     var(--ipod-white);
  --surface-graphite:  var(--ipod-graphite);
  --surface-lcd:       #E7F0F6;
  --surface-warm:      var(--ipod-warm);
  --surface-terminal:  var(--ipod-graphite);

  --text-primary:      var(--ipod-ink);
  --text-secondary:    var(--ipod-ink-soft);
  --text-on-dark:      #F2F2F0;
  --text-on-dark-soft: #C7C7CB;
  --text-on-dark-muted:#A9A9AD;
  --text-on-accent:    #FFFFFF;
  --text-link:         var(--ipod-blue);
  --text-lcd-strong:   #1E2A36;
  --text-lcd:          var(--ipod-blue-deep);
  --text-lcd-muted:    #4F6373;
  --text-chrome-muted: #7C7C78;
  --text-terminal:     #D6E3EC;
  --text-terminal-muted:#7E8B95;
  --text-warning:      #6E561C;
  --text-warning-strong:#8A6A1E;
  --text-success:      #4C7A47;
  --text-error:        #8E4444;

  --border-hairline:   var(--ipod-silver);
  --border-soft:       var(--ipod-silver-soft);
  --border-strong:     var(--ipod-silver-deep);
  --border-graphite:   #1C1C1E;
  --border-lcd:        #9FB3C2;
  --border-lcd-soft:   #A9C4DC;
  --border-warning:    #E0CB8F;
  --border-success:    #B9D2B4;
  --border-error:      #DFB6B6;

  --accent-primary:    var(--ipod-blue);
  --accent-primary-hover: var(--ipod-blue-bright);
  --accent-primary-press: var(--ipod-blue-deep);
  --accent-lcd:        var(--ipod-lcd);
  --accent-vintage:    var(--ipod-copper);
  --accent-vintage-soft:#B58A61;

  --status-success:    var(--ipod-green);
  --status-warning:    var(--ipod-amber);
  --status-error:      var(--ipod-red);

  --status-success-soft: #E6F0E4;
  --status-warning-soft: #F6ECD4;
  --status-error-soft:   #F2E0E0;
  --terminal-success: #9FD49A;
  --terminal-warning: #E2C172;
  --terminal-error:   #E59A9A;

  --focus-ring:        #3E6F9E;

  /* ---- Type ---- */
  --font-ui: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Arial, sans-serif;
  --font-display: "DM Serif Display", "Hoefler Text", Georgia, serif;
  --font-deco: "Limelight", "Copperplate", "Times New Roman", serif;
  --font-script: "Kaushan Script", "Brush Script MT", cursive;
  --font-typewriter: "Special Elite", "Courier New", monospace;
  --font-lcd: "VT323", "SF Mono", "Menlo", monospace;
  --font-terminal: "SF Mono", "Menlo", "Consolas", ui-monospace, monospace;
  --font-mono: var(--font-typewriter);

  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold: 600;
  --weight-bold:    700;

  --text-display:   40px;
  --text-h1:        30px;
  --text-h2:        24px;
  --text-h3:        19px;
  --text-body-lg:   17px;
  --text-body:      15px;
  --text-sm:        13px;
  --text-xs:        11px;
  --text-mono:      13px;

  --leading-tight:  1.15;
  --leading-snug:   1.3;
  --leading-normal: 1.5;

  --tracking-tight: 0;
  --tracking-normal: 0;
  --tracking-wide:  0.04em;
  --tracking-label: 0.08em;
  --tracking-deco:  0.28em;
  --tracking-lcd:   0.04em;
  --tracking-badge: 0.02em;

  /* ---- Spacing ---- */
  --space-1:  2px;  --space-2:  4px;  --space-3:  8px;  --space-4:  12px;
  --space-5:  16px; --space-6:  20px; --space-7:  24px; --space-8:  32px;
  --space-9:  40px; --space-10: 48px; --space-12: 64px; --space-16: 96px;

  --control-h-sm: 28px;
  --control-h:    36px;
  --control-h-lg: 44px;
  --container-max: 1120px;
  --content-max:   720px;

  /* ---- Radii ---- */
  --radius-xs:  4px;
  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  14px;
  --radius-xl:  20px;
  --radius-pill: 999px;
  --radius-ipod: 18px;

  /* ---- Shadows ---- */
  --shadow-card:
    0 1px 2px rgba(17, 17, 17, 0.06),
    0 2px 8px rgba(17, 17, 17, 0.06);
  --shadow-raised:
    0 2px 4px rgba(17, 17, 17, 0.08),
    0 8px 24px rgba(17, 17, 17, 0.10);
  --shadow-float:
    0 8px 16px rgba(17, 17, 17, 0.10),
    0 24px 48px rgba(17, 17, 17, 0.16);
  --shadow-inset:
    inset 0 1px 2px rgba(17, 17, 17, 0.10),
    inset 0 0 0 1px rgba(17, 17, 17, 0.04);

  --gloss-top: inset 0 1px 0 rgba(255, 255, 255, 0.55);
  --gloss-top-dark: inset 0 1px 0 rgba(255, 255, 255, 0.12);
  --ring-focus: 0 0 0 3px rgba(62, 111, 158, 0.35);

  /* ---- Surface gradients ---- */
  --grad-panel:   linear-gradient(180deg, #FFFFFF 0%, #F4F4F1 100%);
  --grad-chrome:  linear-gradient(180deg, #FAFAF8 0%, #E4E4E0 100%);
  --grad-graphite: linear-gradient(180deg, #3A3A3C 0%, #2C2C2E 100%);
  --grad-select:  linear-gradient(180deg, var(--ipod-select-top) 0%, var(--ipod-select-bottom) 100%);
  --grad-primary: linear-gradient(180deg, var(--ipod-blue-bright) 0%, var(--ipod-blue) 100%);
  --grad-lcd:     linear-gradient(180deg, #EEF4F8 0%, #DCE8F0 100%);
}

/* ============================================================
   iListen — global base styles & resets
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html, body, #root { height: 100%; }

body {
  margin: 0;
  background: var(--bg-app);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: var(--text-body);
  line-height: var(--leading-normal);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, p { margin: 0; }

button { font-family: inherit; }

a { color: var(--text-link); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Faint early-Aqua pinstripe behind the whole app */
.il-desktop {
  min-height: 100%;
  background-image: repeating-linear-gradient(
    180deg, rgba(255, 255, 255, 0.45) 0 1px, transparent 1px 5px
  );
}

/* Custom thin scrollbars to match the utility feel */
.il-scroll::-webkit-scrollbar { width: 12px; height: 12px; }
.il-scroll::-webkit-scrollbar-track { background: var(--surface-recessed); }
.il-scroll::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #CFCFCA, #B4B4B0);
  border: 2px solid var(--surface-recessed);
  border-radius: var(--radius-pill);
}
.il-scroll::-webkit-scrollbar-thumb:hover { background: #ADADA8; }

/* Reusable micro-label */
.il-label {
  font-size: var(--text-xs);
  font-family: var(--font-typewriter);
  text-transform: uppercase;
  letter-spacing: var(--tracking-label);
  color: var(--text-secondary);
  font-weight: var(--weight-regular);
}

@keyframes il-fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.il-fade-in { animation: il-fade-in 200ms ease both; }

/* Range slider — brushed track + metal knob */
.il-slider {
  -webkit-appearance: none;
  appearance: none;
  height: 8px;
  border-radius: var(--radius-pill);
  background: var(--surface-recessed);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow-inset);
  outline: none;
  cursor: pointer;
}
.il-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 35%, #FFFFFF, #E2E2DE);
  border: 1px solid var(--border-strong);
  box-shadow: 0 1px 2px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.9);
}
.il-slider::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 35%, #FFFFFF, #E2E2DE);
  border: 1px solid var(--border-strong);
  box-shadow: 0 1px 2px rgba(0,0,0,0.25);
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

<script type="text/babel" data-presets="react">const { useState, useRef, useEffect, useCallback, useMemo } = React;


/* ===== components/ui/Icon.jsx ===== */
// iListen bitmap icon set — classic-system glyphs on a 16px grid,
// rendered crisp-edged with a 1px white emboss so they read as
// chiseled into the metal. Add new glyphs by adding a 16-row matrix.
const GLYPHS = {
  paste: ["................","....######......","...#......#.....","...#.####.#.....","..##########....","..#........#....","..#.######.#....","..#........#....","..#.######.#....","..#........#....","..#.######.#....","..#........#....","..##########....","................","................","................"],
  queue: ["................","................","..##...######...","..##...######...","................","..##...######...","..##...######...","................","..##...######...","..##...######...","................","..##...####.....","..##...####.....","................","................","................"],
  note:  ["................",".........#####..",".........#####..",".........##..##.",".........##..##.",".........##..##.",".........##.....",".........##.....",".........##.....","...####..##.....","..######.##.....",".########.#.....",".#######........",".######.........","..####..........","................"],
  art:   ["................","..############..","..#..........#..","..#...##.....#..","..#..####....#..","..#...##.....#..","..#..........#..","..#..........#..","..#....##....#..","..#...####...#..","..#..######..#..","..#.########.#..","..############..","................","................","................"],
  get:   ["................",".......##.......",".......##.......",".......##.......",".......##.......","....########....",".....######.....","......####......",".......##.......","................","...#........#...","...#........#...","...#........#...","...##########...","................","................"],
  logs:  ["................","..############..","..#..........#..","..############..","..#..........#..","..#.##.......#..","..#...##.....#..","..#.##.......#..","..#..........#..","..#....####..#..","..#..........#..","..############..","................","................","................","................"],
  prefs: ["................","................",".......##.......","..############..",".......##.......","................","................","....##..........","..############..","....##..........","................","................","................","................","................","................"],
  done:  ["................","................","............###.","...........###..","..........###...",".........###....","..##....###.....","..###..###......","...######.......","....####........",".....##.........","................","................","................","................","................"],
  warn:  ["................",".......##.......",".......##.......","......####......","......#..#......",".....##..##.....",".....##..##.....","....###..###....","....###..###....","...####..####...","...##########...","..####....####..","..############..","................","................","................"],
  fail:  ["................","................","...##......##...","...###....###...","....###..###....",".....######.....","......####......","......####......",".....######.....","....###..###....","...###....###...","...##......##...","................","................","................","................"],
  play:  ["................","....##..........","....####........","....######......","....########....","....##########..","....############","....##########..","....########....","....######......","....####........","....##..........","................","................","................","................"],
  trash: ["................","......####......","....##########..","..##........##..","..############..","...#........#...","...#.##.##.#.....","...#.##.##.#.....","...#.##.##.#.....","...#.##.##.#.....","...#.##.##.#.....","...##########...","....########....","................","................","................"],
  zip:   ["................","..#######.......","..#.....#.......","..#.###.#.......","..#.###.######..","..#.........#...","..#.######..#...","..#......#..#...","..#.######..#...","..#......#..#...","..#.######..#...","..#.........#...","..##########....","................","................","................"],
  csv:   ["................","..########......","..#......##.....","..#......###....","..#........#....","..#.######.#....","..#........#....","..#.######.#....","..#........#....","..#.######.#....","..#........#....","..#........#....","..##########....","................","................","................"],
  back:  ["................","................",".......##.......","......##........",".....##.........","....##..........","...############.","....##..........",".....##.........","......##........",".......##.......","................","................","................","................","................"],
  close: ["................","................","...#........#...","...##......##...","....##....##....",".....##..##.....","......####......",".....##..##.....","....##....##....","...##......##...","...#........#...","................","................","................","................","................"],
};
function Icon({ name, size = 18, color = "#2C2C2E", emboss = true, style = {} }) {
  const grid = GLYPHS[name];
  if (!grid) return null;
  const main = [];
  const hi = [];
  grid.forEach((row, y) => {
    [...row].forEach((c, x) => {
      if (c === "#") {
        main.push(<rect key={`m${x}_${y}`} x={x} y={y} width="1" height="1" />);
        if (emboss) hi.push(<rect key={`h${x}_${y}`} x={x + 1} y={y + 1} width="1" height="1" />);
      }
    });
  });
  return (
    <svg viewBox="0 0 17 17" width={size} height={size} shapeRendering="crispEdges" style={{ display: "block", ...style }} aria-hidden="true">
      {emboss && <g fill="rgba(255,255,255,0.75)">{hi}</g>}
      <g fill={color}>{main}</g>
    </svg>
  );
}
const ICON_NAMES = Object.keys(GLYPHS);

/* ===== components/ui/Button.jsx ===== */
/**
 * Brushed-metal button with a glossy top highlight (iPod / early-iTunes chrome).
 * variant: primary | secondary | graphite | ghost | danger
 * size: sm | md | lg
 */
function Button({
  variant = "secondary",
  size = "md",
  iconLeft = null,
  iconRight = null,
  disabled = false,
  fullWidth = false,
  children,
  style = {},
  ...rest
}) {
  const sizes = {
    sm: { height: "var(--control-h-sm)", padding: "0 12px", font: "var(--text-sm)" },
    md: { height: "var(--control-h)", padding: "0 16px", font: "var(--text-body)" },
    lg: { height: "var(--control-h-lg)", padding: "0 22px", font: "var(--text-body-lg)" },
  };
  const s = sizes[size] || sizes.md;

  const variants = {
    primary: { background: "var(--grad-primary)", color: "var(--text-on-accent)", border: "1px solid var(--accent-primary-press)", boxShadow: "var(--shadow-card), var(--gloss-top-dark)" },
    secondary: { background: "var(--grad-chrome)", color: "var(--text-primary)", border: "1px solid var(--border-strong)", boxShadow: "var(--shadow-card), var(--gloss-top)" },
    graphite: { background: "var(--grad-graphite)", color: "var(--text-on-dark)", border: "1px solid #1f1f21", boxShadow: "var(--shadow-card), var(--gloss-top-dark)" },
    ghost: { background: "transparent", color: "var(--accent-primary)", border: "1px solid transparent", boxShadow: "none" },
    danger: { background: "linear-gradient(180deg, #C97373 0%, var(--status-error) 100%)", color: "var(--text-on-accent)", border: "1px solid #9c4a4a", boxShadow: "var(--shadow-card), var(--gloss-top-dark)" },
  };
  const v = variants[variant] || variants.secondary;

  return (
    <button
      disabled={disabled}
      style={{
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        gap: 8,
        height: s.height,
        padding: s.padding,
        fontSize: s.font,
        fontFamily: "var(--font-ui)",
        fontWeight: "var(--weight-medium)",
        borderRadius: "var(--radius-sm)",
        cursor: disabled ? "not-allowed" : "pointer",
        opacity: disabled ? 0.5 : 1,
        width: fullWidth ? "100%" : "auto",
        whiteSpace: "nowrap",
        transition: "filter 120ms ease, transform 80ms ease",
        ...v,
        ...style,
      }}
      onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = "translateY(0.5px)")}
      onMouseUp={(e) => (e.currentTarget.style.transform = "")}
      onMouseLeave={(e) => (e.currentTarget.style.transform = "")}
      {...rest}
    >
      {iconLeft}
      {children}
      {iconRight}
    </button>
  );
}

/* ===== components/ui/Card.jsx ===== */
/** Soft rounded panel. variant: panel | recessed | graphite */
function Card({ variant = "panel", padding = 20, children, style = {}, ...rest }) {
  const variants = {
    panel: { background: "var(--surface-panel)", border: "1px solid var(--border-hairline)", boxShadow: "var(--shadow-card)", color: "var(--text-primary)" },
    recessed: { background: "var(--surface-recessed)", border: "1px solid var(--border-soft)", boxShadow: "var(--shadow-inset)", color: "var(--text-primary)" },
    graphite: { background: "var(--grad-graphite)", border: "1px solid #1f1f21", boxShadow: "var(--shadow-card), var(--gloss-top-dark)", color: "var(--text-on-dark)" },
  };
  const v = variants[variant] || variants.panel;
  return (
    <div style={{ borderRadius: "var(--radius-md)", padding, ...v, ...style }} {...rest}>
      {children}
    </div>
  );
}

/* ===== components/ui/Input.jsx ===== */
/** Recessed white text well with inset shadow and silver hairline. */
function Input({
  value,
  onChange,
  placeholder = "",
  iconLeft = null,
  mono = false,
  invalid = false,
  disabled = false,
  size = "md",
  style = {},
  ...rest
}) {
  const sizes = {
    sm: { height: "var(--control-h-sm)", font: "var(--text-sm)" },
    md: { height: "var(--control-h)", font: "var(--text-body)" },
    lg: { height: "var(--control-h-lg)", font: "var(--text-body-lg)" },
  };
  const s = sizes[size] || sizes.md;
  const [focus, setFocus] = React.useState(false);

  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 8,
        height: s.height,
        padding: "0 12px",
        background: disabled ? "var(--surface-recessed)" : "var(--surface-panel)",
        border: `1px solid ${invalid ? "var(--status-error)" : "var(--border-hairline)"}`,
        borderRadius: "var(--radius-sm)",
        boxShadow: focus ? "var(--ring-focus), var(--shadow-inset)" : "var(--shadow-inset)",
        transition: "box-shadow 120ms ease, border-color 120ms ease",
        opacity: disabled ? 0.6 : 1,
        ...style,
      }}
    >
      {iconLeft && <span style={{ display: "flex", color: "var(--text-secondary)", flex: "none" }}>{iconLeft}</span>}
      <input
        value={value}
        onChange={onChange}
        placeholder={placeholder}
        disabled={disabled}
        onFocus={() => setFocus(true)}
        onBlur={() => setFocus(false)}
        style={{
          flex: 1,
          minWidth: 0,
          border: "none",
          outline: "none",
          background: "transparent",
          fontSize: s.font,
          fontFamily: mono ? "var(--font-mono)" : "var(--font-ui)",
          color: "var(--text-primary)",
        }}
        {...rest}
      />
    </div>
  );
}

/* ===== components/ui/Select.jsx ===== */
/** Brushed-chrome popup menu wrapping a native <select>. */
function Select({ value, onChange, options = [], disabled = false, size = "md", style = {}, ...rest }) {
  const sizes = {
    sm: { height: "var(--control-h-sm)", font: "var(--text-sm)" },
    md: { height: "var(--control-h)", font: "var(--text-body)" },
    lg: { height: "var(--control-h-lg)", font: "var(--text-body-lg)" },
  };
  const s = sizes[size] || sizes.md;

  return (
    <div

let _id = 0;
const nextId = () => `trk_${++_id}`;

function fmtTime(sec) {
  if (!Number.isFinite(sec) || sec <= 0) {
    return "Pending";
  }
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, "0")}`;
}
function estimateSize(durationSec, kbps) {
  if (!Number.isFinite(durationSec) || durationSec <= 0) {
    return "Backend pending";
  }
  const mb = (durationSec * kbps) / 8 / 1024;
  return `${mb.toFixed(1)} MB`;
}

// Build a queued import from a pasted URL. Real metadata arrives from a backend.
function makeTrack({ url, videoTitle, artist = "Unknown Artist", title, album = "Imported links", year = "", durationSec = null, index = 0 }) {

    id: nextId(),
    url,
    videoTitle,
    thumbColor: COVER_COLORS[index % COVER_COLORS.length],

    title: title || `Imported link ${index + 1}`,
    artist,
    album,

    comment: "Queued in the frontend prototype. Backend conversion is not connected in this build.",
    versionLabel: "",
    durationSec,
    duration: fmtTime(durationSec),
    // output
    format: "mp3",
    preset: "balanced",
    coverArt: null,
    // processing
    progress: 0,
    status: "queued",
    size: estimateSize(durationSec, 245),
    warning: null,
    error: null,
  };
}

/* ===== utils/download.js ===== */
// Real client-side file exports. Audio/ZIP export remains backend-only.

function triggerDownload(filename, text, mime = "text/plain") {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

const csvField = (v) => {
  const s = String(v ?? "");
  return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
};
function exportCSV(tracks) {
  const cols = ["Track", "Title", "Artist", "Album", "Year", "Genre", "Source URL", "Format", "Preset", "Size", "Duration", "Status", "Prototype Note"];
  const rows = tracks.map((t) => [
    t.track,
    t.title,
    t.artist,
    t.album,
    t.year,
    t.genre,
    t.url,
    t.format.toUpperCase(),
    t.preset,
    t.size,
    t.duration,
    t.status,
    t.status === "queued" ? "Backend conversion is not connected in this build." : "",
  ]);
  const csv = [cols, ...rows].map((r) => r.map(csvField).join(",")).join("\n");
  triggerDownload("ilisten-report.csv", csv, "text/csv");
}
function exportLogs(logs) {
  const text = logs.map((l) => `${l.t} ${l.label ? l.label + " " : ""}${l.msg}`).join("\n");
  triggerDownload("ilisten-logs.txt", text);
}
function exportLibraryManifest(tracks, pattern = "track-song") {
  const done = tracks.filter((t) => t.status === "complete");
  const lines = ["Music Library/"];
  const byArtist = {};
  done.forEach((t) => {
    (byArtist[t.artist] = byArtist[t.artist] || []).push(t);
  });
  Object.entries(byArtist).forEach(([artist, items]) => {
    lines.push(`  ${artist}/`);
    const byAlbum = {};
    items.forEach((t) => (byAlbum[t.album] = byAlbum[t.album] || []).push(t));
    Object.entries(byAlbum).forEach(([album, ts]) => {
      lines.push(`    ${album}/`);
      ts.forEach((t) => lines.push(`      ${filenameFor(t, pattern)}`));
    });
  });
  triggerDownload("ilisten-library-manifest.txt", lines.join("\n"));
}
function exportBackendManifest(tracks, pattern = "track-song") {
  const lines = [
    "iListen Backend Conversion Manifest",
    "Backend conversion is not connected in this frontend build.",
    `Queued imports: ${tracks.length}`,
    "",
  ];
  if (!tracks.length) {
    lines.push("No queued imports.");
  } else {
    tracks.forEach((track, index) => {
      lines.push(`${index + 1}. ${track.title || `Imported link ${index + 1}`}`);
      lines.push(`   Source URL: ${track.url || track.videoTitle || "Unknown source"}`);
      lines.push(`   Status: ${track.status}`);
      lines.push(`   Planned output: ${track.format.toUpperCase()} / ${track.preset}`);
      lines.push(`   Planned filename: ${filenameFor(track, pattern)}`);
      lines.push("");
    });
  }
  triggerDownload("ilisten-backend-manifest.txt", lines.join("\n").trimEnd());
}
function filenameFor(t, pattern) {
  const ext = t.format === "aac" ? "m4a" : "mp3";
  const tn = String(t.track).padStart(2, "0");
  switch (pattern) {
    case "artist-song": return `${t.artist} - ${t.title}.${ext}`;
    case "artist-track-song": return `${t.artist} - ${tn} - ${t.title}.${ext}`;
    case "year-artist-song": return `${t.year} - ${t.artist} - ${t.title}.${ext}`;
    case "track-song":
    default: return `${tn} - ${t.title}.${ext}`;
  }
}

/* ===== hooks/useConverter.js ===== */
function ts() {
  const d = new Date();
  return `[${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}]`;
}

function useConverter() {
  const [tracks, setTracks] = useState([]);
  const [logs, setLogs] = useState([
    { t: ts(), kind: null, msg: "iListen ready. Paste links to build a backend conversion queue." },
    { t: ts(), kind: "warn", label: "Prototype:", msg: "Backend conversion is not connected in this build." },
  ]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [globalCover, setGlobalCover] = useState(null);

  const tracksRef = useRef(tracks);
  const settingsRef = useRef(settings);
  tracksRef.current = tracks;
  settingsRef.current = settings;

  const pushLog = useCallback((msg, kind = null, label = null) => {
    if (!settingsRef.current.generateLogs) return;
    setLogs((prev) => [...prev, { t: ts(), kind, label, msg }]);
  }, []);

  const presetKbps = (preset, format) => {
    const p = PRESETS.find((x) => x.id === preset);
    let kbps = p ? p.kbps : 245;
    if (format === "aac" && preset !== "archive") kbps = 256;
    return kbps;
  };

  // ---- actions ----
  const start = useCallback(() => {
    if (!tracksRef.current.length) {
      pushLog("No queued links yet. Add links before exporting a backend manifest.", null, "Prototype:");
      return false;
    }
    pushLog("Backend conversion is not connected in this build. Export a backend manifest for a future worker instead.", "warn", "Prototype:");
    return false;
  }, [pushLog]);

  const pause = useCallback(() => {
    pushLog("No conversion job is running because no backend is connected.", null, "Prototype:");
  }, [pushLog]);

  const addFromLinks = useCallback((text) => {
    const urls = text.split(/\n+/).map((l) => l.trim()).filter(Boolean);
    if (!urls.length) return 0;
    const existing = new Set(tracksRef.current.map((t) => t.url));
    const fresh = [];
    urls.forEach((url) => {
      if (settingsRef.current.skipConverted && existing.has(url)) return;
      existing.add(url);
      const index = tracksRef.current.length + fresh.length;
      fresh.push(makeTrack({
        url,
        videoTitle: url,
        title: `Imported link ${index + 1}`,
        index,
      }));
    });
    if (fresh.length) {
      setTracks((prev) => [...prev, ...fresh]);
      pushLog(`Added ${fresh.length} queued import${fresh.length > 1 ? "s" : ""}.`, null, "Queue:");
      fresh.forEach((track) => pushLog(`${track.title}: ${track.url}`, null, "Added:"));
      pushLog("Backend conversion is not connected in this build.", "warn", "Prototype:");
    }
    return fresh.length;
  }, [pushLog]);

  const updateTrack = useCallback((id, patch) => {
    setTracks((prev) => prev.map((t) => {
      if (t.id !== id) return t;
      const merged = { ...t, ...patch };
      if (patch.format || patch.preset) {
        merged.size = estimateSize(merged.durationSec, presetKbps(merged.preset, merged.format));
      }
      return merged;
    }));
  }, []);

  const applyToAll = useCallback((patch) => {
    setTracks((prev) => prev.map((t) => {
      const merged = { ...t, ...patch };
      merged.size = estimateSize(merged.durationSec, presetKbps(merged.preset, merged.format));
      return merged;
    }));
  }, []);

  const removeTrack = useCallback((id) => {
    setTracks((prev) => prev.filter((t) => t.id !== id));
  }, []);

  const retry = useCallback((id) => {
    setTracks((prev) => prev.map((t) => (t.id === id ? { ...t, status: "queued", progress: 0, error: null, warning: null } : t)));
    pushLog("Re-queued import. Backend conversion is still not connected.", null, "Queue:");
  }, [pushLog]);

  const clearCompleted = useCallback(() => {
    setTracks((prev) => prev.filter((t) => !["complete", "skipped"].includes(t.status)));
  }, []);

  const resetAll = useCallback(() => {
    setTracks((prev) => prev.map((t) => ({ ...t, status: "queued", progress: 0, error: null, warning: null })));
    pushLog("Queue reset. Backend conversion is not connected in this build.", null, "Queue:");
  }, [pushLog]);

  const applyGlobalCover = useCallback((dataUrl) => {
    setGlobalCover(dataUrl);
    setTracks((prev) => prev.map((t) => ({ ...t, coverArt: dataUrl })));
    pushLog("Applied cover art to all tracks.");
  }, [pushLog]);

  const updateSettings = useCallback((patch) => {
    setSettings((prev) => ({ ...prev, ...patch }));
  }, []);

  return {
    tracks, logs, settings, isProcessing: false, globalCover,
    actions: {
      start, pause, addFromLinks, updateTrack, applyToAll, removeTrack,
      retry, clearCompleted, resetAll, applyGlobalCover, updateSettings,
      setGlobalCover, pushLog,
    },
  };
}

        )}
        {(track.status === "queued" || isSkip) && (
          <>
            <Button size="sm" variant="ghost" onClick={() => onEdit(track)} title="Edit metadata"><Icon name="prefs" size={14} /></Button>
            <Button size="sm" variant="ghost" onClick={() => onRemove(track)} title="Remove"><Icon name="trash" size={14} color="var(--text-secondary)" /></Button>

  );
}

// Read a File -> dataURL, optionally downscale to a square and/or re-encode as JPEG.
function processImage(file, { resize, toJpeg }) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      if (!resize && !toJpeg) return resolve(reader.result);
      const img = new Image();
      img.onload = () => {
        const target = resize ? 800 : Math.min(img.width, img.height);
        const canvas = document.createElement("canvas");
        const size = Math.min(target, Math.max(img.width, img.height));
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        // center-crop to square
        const side = Math.min(img.width, img.height);
        const sx = (img.width - side) / 2;
        const sy = (img.height - side) / 2;
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        resolve(canvas.toDataURL(toJpeg ? "image/jpeg" : "image/png", 0.9));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/** Drag-and-drop cover-art uploader with resize + PNG→JPEG options. */
function CoverArtUploader({ value, onChange, compact = false }) {
  const [drag, setDrag] = React.useState(false);
  const [resize, setResize] = React.useState(true);
  const [toJpeg, setToJpeg] = React.useState(true);
  const inputRef = React.useRef(null);

  const handleFiles = async (files) => {
    const file = [...files].find((f) => f.type.startsWith("image/"));
    if (!file) return;
    const data = await processImage(file, { resize, toJpeg });
    onChange(data);
  };

  return (
    <div>
      <div
        onClick={() => inputRef.current?.click()}
        onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={(e) => { e.preventDefault(); setDrag(false); handleFiles(e.dataTransfer.files); }}
        style={{
          display: "flex", flexDirection: compact ? "row" : "column", alignItems: "center", justifyContent: "center",
          gap: 12, cursor: "pointer", textAlign: "center",
          padding: compact ? 12 : 20,
          minHeight: compact ? 0 : 150,
          borderRadius: "var(--radius-md)",
          border: `1.5px dashed ${drag ? "var(--accent-primary)" : "var(--border-strong)"}`,
          background: drag ? "var(--surface-lcd)" : "var(--surface-recessed)",
          transition: "border-color 120ms ease, background 120ms ease",
        }}
      >
        <div style={{
          width: compact ? 56 : 84, height: compact ? 56 : 84, flex: "none", borderRadius: "var(--radius-sm)",
          border: "1px solid var(--border-strong)", boxShadow: "var(--shadow-inset)", overflow: "hidden",
          background: value ? `center/cover no-repeat url(${value})` : "var(--surface-panel)",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          {!value && <Icon name="art" size={compact ? 22 : 30} color="var(--border-strong)" />}
        </div>
        <div>
          <div style={{ fontSize: "var(--text-sm)", color: "var(--text-primary)", fontWeight: 600 }}>
            {value ? "Replace cover art" : "Drag & drop artwork"}
          </div>
          <div style={{ fontSize: "var(--text-xs)", color: "var(--text-secondary)", marginTop: 2 }}>
            JPEG/PNG · square 600×600–1000×1000 px
          </div>
        </div>
        <input ref={inputRef} type="file" accept="image/*" hidden onChange={(e) => handleFiles(e.target.files)} />
      </div>

      {!compact && (
        <div style={{ display: "flex", gap: 18, marginTop: 12, flexWrap: "wrap" }}>
          <Switch checked={resize} onChange={setResize} label="Resize to 800×800" />
          <Switch checked={toJpeg} onChange={setToJpeg} label="Convert PNG → JPEG" />
        </div>
      )}
    </div>
  );
}

function FolderTree({ tracks, pattern }) {
  const byArtist = {};
  tracks.forEach((t) => (byArtist[t.artist] = byArtist[t.artist] || {}));
  tracks.forEach((t) => {
    byArtist[t.artist][t.album] = byArtist[t.artist][t.album] || [];
    byArtist[t.artist][t.album].push(t);
  });
  return (
    <div style={{ fontFamily: "var(--font-typewriter)", fontSize: "var(--text-sm)", color: "var(--text-secondary)", lineHeight: 1.7 }}>
      <div style={{ color: "var(--text-primary)" }}>Music Library/</div>
      {Object.entries(byArtist).map(([artist, albums]) => (
        <div key={artist}>
          <div style={{ paddingLeft: 16 }}>{artist}/</div>
          {Object.entries(albums).map(([album, items]) => (
            <div key={album}>
              <div style={{ paddingLeft: 32 }}>{album}/</div>
              {items.map((t) => (
                <div key={t.id} style={{ paddingLeft: 48 }}>{filenameFor(t, pattern)}</div>
              ))}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}
function LibraryView({ tracks, pattern, onZip, onCSV }) {
  const done = tracks.filter((t) => t.status === "complete");
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: 20, alignItems: "start" }}>
      <Card style={{ padding: 0, overflow: "hidden" }}>

          <span style={{ fontFamily: "var(--font-display)", fontWeight: "var(--weight-regular)", fontSize: "var(--text-h3)", lineHeight: "var(--leading-tight)" }}>Converted library</span>
          <span style={{ marginLeft: "auto", fontFamily: "var(--font-typewriter)", fontSize: "var(--text-sm)", color: "var(--text-secondary)" }}>{done.length} tracks</span>
        </div>
        {done.length === 0 ? (
          <div style={{ padding: "48px 18px", textAlign: "center", color: "var(--text-secondary)" }}>
            <Icon name="note" size={30} color="var(--border-strong)" style={{ margin: "0 auto 10px" }} />
            <div>No backend-completed tracks yet.</div>
            <div style={{ fontSize: "var(--text-sm)" }}>Connect a backend worker before this library can contain audio outputs.</div>
          </div>
        ) : (
          <div style={{ padding: 18, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(128px, 1fr))", gap: 16 }}>
            {done.map((t) => <CoverTile key={t.id} track={t} />)}

        )}
      </Card>

      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <Card>
          <div className="il-label" style={{ marginBottom: 10 }}>Folder structure</div>
          {done.length ? <FolderTree tracks={done} pattern={pattern} /> : <div style={{ fontSize: "var(--text-sm)", color: "var(--text-secondary)" }}>No backend-completed files yet.</div>}
        </Card>
        <Card>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Button variant="primary" fullWidth disabled={!done.length} iconLeft={<Icon name="zip" size={14} color="var(--text-on-accent)" emboss={false} />} onClick={onZip}>Download library manifest</Button>
            <Button variant="ghost" fullWidth iconLeft={<Icon name="csv" size={14} />} onClick={onCSV} disabled={!done.length}>Export CSV report</Button>
          </div>

/* ===== App.jsx ===== */
function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div className="il-fade-in" style={{
      position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)", zIndex: 200,
      background: "var(--grad-graphite)", color: "var(--text-on-dark)", padding: "10px 18px",
      borderRadius: "var(--radius-pill)", border: "1px solid var(--border-graphite)",
      boxShadow: "var(--shadow-float), var(--gloss-top-dark)", fontSize: "var(--text-sm)",
    }}>
      {msg}
    </div>
  );
}

function App() {
  const { tracks, logs, settings, globalCover, actions } = useConverter();
  const [tab, setTab] = React.useState("Convert");
  const [preset, setPreset] = React.useState("balanced");
  const [format, setFormat] = React.useState("mp3");

  const [editTrack, setEditTrack] = React.useState(null);
  const [artTarget, setArtTarget] = React.useState(null); // 'all' | trackId | null
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [toast, setToast] = React.useState("");

  const toastRef = React.useRef(null);
  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(""), 2600);
  };

  const completed = tracks.filter((t) => t.status === "complete");
  const nowPlaying = completed[completed.length - 1] || null;
  const pattern = settings.filenamePattern;

  // ---- export handlers ----
  const onZip = () => { exportBackendManifest(tracks, pattern); actions.pushLog("Exported backend conversion manifest. Backend conversion is not connected in this build.", null, "Export:"); showToast("Downloaded backend manifest. Conversion still needs a backend worker."); };
  const onLibrary = () => { exportLibraryManifest(completed, pattern); showToast("Downloaded organized-library manifest for backend-completed tracks."); };
  const onSelected = () => { exportLibraryManifest(completed, pattern); showToast(`${completed.length} completed track(s) included in manifest.`); };
  const onCSV = () => { exportCSV(tracks); actions.pushLog("Exported CSV report.", null, "Export:"); showToast("CSV report downloaded."); };
  const onLogs = () => { exportLogs(logs); showToast("Logs exported."); };
  const onDownloadOne = (t) => showToast(`"${filenameFor(t, pattern)}" is a planned filename only. Audio export needs a backend.`);

  const applyArt = (art) => {
    if (artTarget === "all") actions.applyGlobalCover(art);
    else if (artTarget) actions.updateTrack(artTarget, { coverArt: art });
    setArtTarget(null);
  };

  const jobInfo = `${tracks.length} queued · backend offline · ${format.toUpperCase()}`;

  return (
    <div className="il-desktop">
      <TopBar tab={tab} setTab={setTab} onOpenSettings={() => setSettingsOpen(true)} jobInfo={jobInfo} />

      <main style={{ maxWidth: "var(--container-max)", width: "100%", margin: "0 auto", padding: "22px 22px 48px", boxSizing: "border-box" }}>
        {tab === "Convert" ? (
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) 320px", gap: 20, alignItems: "start" }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 18, minWidth: 0 }}>
              <PastePanel
                onAdd={(text) => { const n = actions.addFromLinks(text); if (n) showToast(`Added ${n} queued import(s). Backend conversion is not connected.`); else showToast("No new links to add."); return n; }}
              />
              <div id="queue">
                <Queue
                  tracks={tracks}
                  onEdit={setEditTrack}
                  onArt={(t) => setArtTarget(t.id)}
                  onDownload={onDownloadOne}
                  onRetry={(t) => actions.retry(t.id)}
                  onRemove={(t) => actions.removeTrack(t.id)}
                  onClear={actions.clearCompleted}
                />
              </div>
              <LogsPanel lines={logs} />
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 18, position: "sticky", top: 78 }}>
              <ExportBar
                completeCount={completed.length}
                totalCount={tracks.length}
                onZip={onZip}
                onLibrary={onLibrary}
                onCSV={onCSV}
                onLogs={onLogs}
                onSelected={onSelected}
              />
              <OutputControls
                preset={preset}
                setPreset={(p) => { setPreset(p); }}
                format={format}
                setFormat={(f) => { setFormat(f); }}
                pattern={pattern}
                setPattern={(p) => actions.updateSettings({ filenamePattern: p })}
                onApplyAll={() => { actions.applyToAll({ preset, format }); showToast("Applied planned preset & format to queued imports."); }}
              />
              <button
                onClick={() => setArtTarget("all")}
                style={{
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8, height: 36,
                  borderRadius: "var(--radius-sm)", cursor: "pointer", fontFamily: "var(--font-ui)",
                  fontSize: "var(--text-sm)", fontWeight: "var(--weight-medium)", color: "var(--text-primary)",
                  background: "var(--grad-chrome)", border: "1px solid var(--border-strong)", boxShadow: "var(--shadow-card), var(--gloss-top)",
                }}
              >
                Cover art for all tracks…
              </button>
              <IpodPreview track={nowPlaying} />
            </div>
          </div>
        ) : (
          <LibraryView tracks={tracks} pattern={pattern} onZip={onLibrary} onCSV={onCSV} />
        )}
      </main>

      <MetadataEditor open={!!editTrack} track={editTrack} onClose={() => setEditTrack(null)} onSave={(id, patch) => { actions.updateTrack(id, patch); setEditTrack(null); showToast("Metadata saved."); }} />
      <CoverArtModal open={!!artTarget} value={artTarget === "all" ? globalCover : (tracks.find((t) => t.id === artTarget)?.coverArt || null)} onClose={() => setArtTarget(null)} onApply={applyArt} />
      <SettingsModal open={settingsOpen} settings={settings} onClose={() => setSettingsOpen(false)} onChange={actions.updateSettings} />

      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
